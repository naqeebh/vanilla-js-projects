<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Modal Project</title>
  </head>
  <body>
    <!-- Modal Open Button -->

    <button id="open-btn">

      <div class="modal">

        <div class="close-btn">@times;</div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
